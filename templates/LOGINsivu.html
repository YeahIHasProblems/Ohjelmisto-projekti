<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhjelmistoPeli</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f2ff;
            --bg: #050208;
            --card-w: 400px;
            --card-h: 550px;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Impact', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* --- TAUSTA --- */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            transform-origin: top;
            animation: gridMove 10s linear infinite;
            z-index: -2;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 50px; }
        }

        #particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(5px);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(5, 2, 8, 0.9) 90%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- KORTTIEN SIJOITTELU --- */
        .deck-container {
            position: relative;
            width: 100%;
            height: var(--card-h);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            z-index: 5;
        }

        .card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            will-change: transform, opacity;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.6s ease;
            opacity: 0; /* Aluksi piilossa ennen initia */
            filter: grayscale(80%) blur(2px);
            pointer-events: none;
            transform-style: preserve-3d;
        }

        .card.active {
            opacity: 1;
            filter: grayscale(0%) blur(0px);
            z-index: 100;
            pointer-events: all;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* ULKOASU (KUVASTA image_01f7dd.png) */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 40px;
            box-sizing: border-box;
            border: 4px solid #222;
            border-left: 12px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            color: #1a1a1a;
        }

        .card-back {
            transform: rotateY(180deg);
            border-left: 4px solid #222;
            border-right: 12px solid var(--accent-color);
        }

        .card.active .card-front, .card.active .card-back {
            box-shadow: 0 0 50px var(--accent-color);
            border-color: var(--accent-color);
        }

        .card-logo {
            font-size: 8rem;
            position: absolute;
            bottom: -10px;
            right: -20px;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .status-tag {
            position: absolute; top: 20px; right: 20px;
            font-family: monospace; font-size: 0.7rem;
            padding: 4px 10px; border-radius: 4px;
            background: #000; color: #fff; text-transform: uppercase;
        }

        h2 { font-size: 3rem; margin: 0; text-transform: uppercase; line-height: 0.9; }

        .tagline {
            font-family: 'Impact', sans-serif; font-size: 0.85rem;
            color: var(--accent-color); margin: 5px 0 15px 0;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .desc-text {
            font-family: sans-serif; font-size: 0.9rem;
            line-height: 1.4; color: #444; margin-bottom: 20px;
            border-left: 2px solid #ddd; padding-left: 10px;
        }

        input {
            width: 100%; padding: 14px; margin: 8px 0;
            border: 2px solid #eee; border-radius: 10px;
            font-family: monospace; font-size: 1.1rem;
            box-sizing: border-box;
        }

        .btn {
            background: #1a1a1a; color: white;
            padding: 20px; border: none; border-radius: 12px;
            text-transform: uppercase; font-weight: bold;
            cursor: pointer; width: 100%;
        }

        .nav-ui { margin-top: 60px; font-family: monospace; color: var(--neon-blue); opacity: 0.7; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div id="particles"></div>
    <div class="vignette"></div>

    <div class="deck-container" id="deck"></div>

    <div class="nav-ui">A / D · ESC (BACK) · ENTER</div>

    <!-- Tärkeä: Flaskin url_for -->
    <script src="{{ url_for('static', filename='LOGINsivu.js') }}"></script>
    <script>
        // Partikkelit
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 30 + 10 + 'px';
            p.style.animationDelay = Math.random() * 20 + 's';
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
