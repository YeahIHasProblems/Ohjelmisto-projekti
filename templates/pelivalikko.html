<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
<style>
    :root {
        --neon-pink: #ff007f;
        --neon-blue: #00f2ff;
        --bg: #050208;
        --card-w: 400px;
        --card-h: 550px;
    }

    #pause-menu {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(5, 2, 8, 0.85);
        backdrop-filter: blur(12px);
        z-index: 10000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .pause-bg-grid {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image:
            linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        transform: perspective(500px) rotateX(60deg) translateY(-100px);
        transform-origin: top;
        animation: gridMove 10s linear infinite;
        z-index: -1;
    }

    @keyframes gridMove {
        from { background-position: 0 0; }
        to { background-position: 0 50px; }
    }

    .pause-card {
        width: var(--card-w);
        height: var(--card-h);
        background: #fdfdfd;
        border-radius: 20px;
        border: 4px solid var(--neon-blue);
        border-left: 12px solid var(--neon-blue);
        box-shadow: 0 0 50px var(--neon-blue);
        padding: 40px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        position: relative;
        color: #1a1a1a;
        transform: perspective(1000px) rotateX(10deg);
        animation: cardFloat 4s ease-in-out infinite;
    }

    @keyframes cardFloat {
        0%, 100% { transform: perspective(1000px) rotateX(10deg) translateY(0); }
        50% { transform: perspective(1000px) rotateX(10deg) translateY(-15px); }
    }

    .pause-card .status-tag {
        position: absolute; top: 20px; right: 20px;
        font-family: monospace; font-size: 0.7rem;
        padding: 4px 10px; border-radius: 4px;
        background: #000; color: #fff; text-transform: uppercase;
    }

    .pause-card h2 {
        font-size: 3rem; margin: 20px 0 0 0;
        text-transform: uppercase; line-height: 0.9;
        font-family: 'Impact', sans-serif;
    }

    .pause-tagline {
        font-family: 'Impact', sans-serif; font-size: 0.85rem;
        color: var(--neon-blue); margin: 5px 0 25px 0;
        text-transform: uppercase; letter-spacing: 1px;
    }

    .pause-stats-box {
        background: #f0f0f0;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
        font-family: monospace;
        border-left: 4px solid #ddd;
    }

    .pause-stats-box p {
        margin: 10px 0;
        font-size: 1.1rem;
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #ccc;
    }

    .pause-btn {
        background: #1a1a1a; color: white;
        padding: 18px; border: none; border-radius: 12px;
        text-transform: uppercase; font-weight: bold;
        font-size: 1.1rem; cursor: pointer;
        transition: 0.2s;
        width: 100%;
        margin-bottom: 10px;
        font-family: 'Impact', sans-serif;
    }

    .pause-btn:hover {
        background: var(--neon-blue);
        color: black;
        transform: scale(1.02);
    }

    .pause-btn.exit:hover {
        background: var(--neon-pink);
        color: white;
    }

    .pause-nav-hint {
        margin-top: 40px;
        font-family: monospace;
        color: var(--neon-blue);
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.7;
    }
</style>

<div id="pause-menu">
    <div class="pause-bg-grid"></div>

    <div class="pause-card">
        <div class="status-tag">SYSTEM PAUSE</div>
        <h2>SIMULAATIO SEIS</h2>
        <div class="pause-tagline">ISTUNTO_KESKEYTETTY // 004</div>

        <div class="pause-stats-box">
            <p>PILOTTI: <span id="p-name">{{ session.get('pelaaja', '---') }}</span></p>
            <p>VARAT: <span id="p-money">{{ session.get('raha', 0) }}</span> €</p>
            <p>TAVOITE: <span id="p-goal">{{ session.get('tavoite', 0) }}</span>/1000</p>
        </div>

        <button class="pause-btn" onclick="togglePause()">Jatka Lentoa</button>
        <button class="pause-btn" onclick="saveGame()">Tallenna Data</button>
        <button class="pause-btn exit" onclick="location.href='/logout'">Katkaise Yhteys</button>
    </div>
    <div class="pause-nav-hint">PAINA [ESC] PALATAKSESI</div>
</div>

<script src="{{ url_for('static', filename='pelivalikko.js') }}"></script>
