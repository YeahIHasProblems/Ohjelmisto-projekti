<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Flight Game</title>

        a:hover, button:hover { background: #555; }
        .container { max-width: 800px; margin: 40px auto; }

    </style>
</head>
<body>

        <p>Raha: {{ session.get('raha', 0) }} | Kierros: {{ session.get('kierros', 0) }} | Tavoite: {{ session.get('tavoite', 0) }}/1000</p>
        <p>Perkit: {{ session.get('perklist', []) }}</p>
    </div>
<p>Valitse toiminto:</p>

<p>
    <a href="{{ url_for('lento') }}">Lennä toiseen paikkaan</a>
</p>
<p>
    <a href="{{ url_for('kauppa_sivu') }}">Avaa kauppa</a>
</p>
</div>

</html>
