{% extends "base.html" %}
{% block content %}
<h2>Sinun perkit</h2>

{% if session.get("perklist") %}
    <ul>
    {% for perk in session["perklist"] %}
        <li>{{ perk }}</li>
    {% endfor %}
    </ul>
{% else %}
    <p>Sinulla ei ole vielä perkkejä.</p>
{% endif %}

<p><a href="{{ url_for('index') }}">Takaisin valikkoon</a></p>
{% endblock %}
