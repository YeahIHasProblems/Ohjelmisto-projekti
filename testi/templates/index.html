<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burn & Bet - Päävalikko</title>
    <style>
        body {
            /* Taustakuva asetukset */
            background: url("{{ url_for('static', filename='BURN_BET.png') }}") no-repeat center center fixed;
            background-size: 100% 100%;
            color: white;
            font-family: 'Impact', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }


        .btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: #ff4d4d;
            padding: 20px 40px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ff4d4d;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff4d4d;
            background: #ff4d4d;
            color: black;
        }


        .btn-kauppa { top: 40px; left: 40px; }
        .btn-lento { bottom: 60px; left: 60px; padding: 30px 60px; font-size: 32px; }
        .btn-blackjack { bottom: 60px; right: 60px; padding: 30px 60px; font-size: 32px; }
        .btn-perkit { top: 220px; right: 40px; padding: 10px 25px; font-size: 18px; border-color: #ff4d4d; color: #ff4d4d; }
        .btn-perkit:hover { box-shadow: 0 0 20px #ff4d4d; background: #ff4d4d; color: white; }


        .stats-container {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #ff4d4d;
            text-align: left;
            min-width: 150px;
        }

        .stats-container p {
            margin: 5px 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            font-size: 12px;
        }

        h1 {
            display: none;
        }
    </style>
</head>
<body>


    <a href="{{ url_for('kauppa_sivu') }}" class="btn btn-kauppa">Kauppa</a>

    <div class="stats-container">
        <p>💰 RAHA: {{ session['raha'] }}€</p>
        <p>🎯 SCORE: {{ session['tavoite'] }}</p>
        <p>🔄 KIERROS: {{ session['kierros'] }}</p>
    </div>

    <a href="{{ url_for('perkit') }}" class="btn btn-perkit">Perkit</a>

    <a href="{{ url_for('lento') }}" class="btn btn-lento">Lento</a>

    <a href="{{ url_for('blackjack') }}" class="btn btn-blackjack">Blackjack</a>

    <p class="hint">[ PAINA ESC AVATAKSESI VALIKON ]</p>

    <!-- Valikko-include -->
    {% include 'pelivalikko.html' %}

</body>
</html>
